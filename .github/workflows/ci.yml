name: TOMAS-AGI CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ============================================================
  # 前端：TypeScript build + Vitest
  # ============================================================
  frontend:
    name: Frontend (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deepseek-chat
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: deepseek-chat/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Vitest tests
        run: npm test -- --reporter=verbose

  # ============================================================
  # 后端：pytest
  # ============================================================
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tomas_agi
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flask flask-cors sqlalchemy

      - name: Run pytest
        run: python -m pytest tests/ -v
